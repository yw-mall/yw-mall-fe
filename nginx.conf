server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Podman's embedded DNS (10.89.0.1) so the upstream hostname is
    # re-resolved every 30 s. Without `resolver` + a variable in `proxy_pass`,
    # nginx caches the IP at startup and serves 502 forever after a backend
    # container is force-recreated and gets a new IP.
    resolver 10.89.0.1 valid=30s ipv6=off;

    # Proxy API calls to the backend gateway
    location /api/ {
        set $upstream_api "apisix:9080";
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
