server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Podman's embedded DNS (10.89.0.1) so the upstream hostname is
    # re-resolved every 30 s. Without `resolver` + a variable in `proxy_pass`,
    # nginx caches the IP at startup and serves 502 forever after a backend
    # container is force-recreated and gets a new IP.
    resolver 10.89.0.1 valid=30s ipv6=off;

    # Proxy API calls to the backend gateway
    location /api/ {
        # ---- Trace propagation ----
        # 浏览器一般不主动发 traceparent / X-Request-Id；这里不区分客户端是否
        # 已经带，统一覆盖：上游 APISIX → mall-api 的 go-zero 拿到一致的
        # trace_id 写入日志。浏览器 F12 看 response 头里的 X-Trace-Id /
        # X-Request-Id 就能拿到当次链路 id 提工单。
        #
        # 注: 这里没区分 inbound traceparent，是因为 nginx 简单 conf 里同时支持
        # "客户端有则透传，没有则生成" 需要 http-block map + pcre，复杂度高。
        # 实际 H5 浏览器不会主动发 traceparent，统一生成更简洁。
        set $upstream_api "apisix:9080";
        proxy_pass         http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-Id      $request_id;

        # 响应回写给浏览器，F12 看 response 头能拿 request_id 提工单。
        add_header X-Request-Id  $request_id always;
    }

    # SPA fallback — all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
